name: Android CD

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        type: choice
        options:
          - apk
          - aab
        default: aab
      upload_to_play:
        description: 'Upload to Google Play Console'
        required: false
        type: boolean
        default: true
      version_name:
        description: 'Version name (e.g. 2.5.0). Leave empty to use build.gradle.kts value'
        required: false
        type: string
        default: ''
      track:
        description: 'Google Play Track'
        required: true
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
        default: internal
      submit_for_review:
        description: 'Submit the release for review (status=completed). Uncheck to upload as a draft.'
        required: false
        type: boolean
        default: true
      managed_publishing:
        description: 'Play Console Managed Publishing is ON. Keep checked to match that setting (sends changesNotSentForReview=true). Uncheck only if Managed Publishing is OFF.'
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Check out the branch (not a detached commit) and keep history so we
          # can commit the version bump back after a successful publish.
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          python3 -c "import json; json.load(open('app/google-services.json'))" || { echo "ERROR: google-services.json is not valid JSON. Check secret value."; exit 1; }

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d ' \n\r' | base64 --decode > app/release.keystore

      - name: Validate keystore
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "--- Checking required secrets are non-empty ---"
          [ -n "$ANDROID_KEYSTORE_PASSWORD" ] || { echo "ERROR: ANDROID_KEYSTORE_PASSWORD is empty"; exit 1; }
          [ -n "$ANDROID_KEY_ALIAS" ]         || { echo "ERROR: ANDROID_KEY_ALIAS is empty"; exit 1; }
          [ -n "$ANDROID_KEY_PASSWORD" ]      || { echo "ERROR: ANDROID_KEY_PASSWORD is empty"; exit 1; }
          echo "--- Verifying keystore file can be opened ---"
          keytool -list \
            -keystore app/release.keystore \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            -v 2>&1 | grep -E "Alias name|Entry type|ERROR|error" \
            || { echo "ERROR: keytool could not read the keystore. Check passwords and alias."; exit 1; }
          echo "--- Keystore validation passed ---"

      - name: Update version name
        if: ${{ github.event.inputs.version_name != '' }}
        run: |
          sed -i "s/versionName = \".*\"/versionName = \"${{ github.event.inputs.version_name }}\"/" app/build.gradle.kts
          echo "Updated versionName to ${{ github.event.inputs.version_name }}"
          grep versionName app/build.gradle.kts

      # Step 1: bump the versionCode BEFORE building so the artifact that gets
      # published carries the new code. The change is committed back only after
      # a successful publish (see the final step).
      - name: Bump versionCode
        id: bump
        run: |
          set -euo pipefail
          GRADLE_FILE="app/build.gradle.kts"

          CURRENT=$(grep -E '^\s*versionCode\s*=\s*[0-9]+' "$GRADLE_FILE" | grep -oE '[0-9]+' | head -n1)
          if [ -z "${CURRENT:-}" ]; then
            echo "ERROR: Could not find versionCode in $GRADLE_FILE"
            exit 1
          fi

          NEXT=$((CURRENT + 1))
          echo "Bumping versionCode: $CURRENT -> $NEXT"

          # Replace the versionCode value, preserving the original indentation.
          sed -i -E "s/^([[:space:]]*versionCode[[:space:]]*=[[:space:]]*)[0-9]+/\1${NEXT}/" "$GRADLE_FILE"

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          grep versionCode "$GRADLE_FILE"

      - name: Build APK with Gradle
        if: ${{ github.event.inputs.build_type == 'apk' }}
        run: ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_FILE: ../app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build AAB with Gradle
        if: ${{ github.event.inputs.build_type == 'aab' }}
        run: ./gradlew bundleRelease
        env:
          ANDROID_KEYSTORE_FILE: ../app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # Prove the bundle carries our release signature before we ship it. An .aab is
      # a zip signed with the JAR (v1) scheme using the upload key, so jarsigner can
      # verify it. This fails the run early if the signingConfig didn't apply (which
      # would otherwise surface later as an "unsigned"/signature error in Play).
      - name: Verify AAB is signed
        if: ${{ github.event.inputs.build_type == 'aab' }}
        run: |
          set -euo pipefail
          AAB=$(ls app/build/outputs/bundle/release/*.aab | head -n1)
          echo "Verifying signature of $AAB"
          if jarsigner -verify -strict "$AAB" > /tmp/jarsigner.out 2>&1; then
            echo "--- AAB signature verified ---"
          else
            # -strict also returns non-zero for non-fatal warnings (e.g. self-signed
            # upload cert), so only treat a genuinely missing signature as fatal.
            if grep -qi "jar is unsigned" /tmp/jarsigner.out; then
              echo "ERROR: the AAB is NOT signed. Check the release signingConfig and keystore secrets."
              cat /tmp/jarsigner.out
              exit 1
            fi
            echo "--- AAB is signed (jarsigner -strict reported only non-fatal warnings) ---"
          fi
          # Print the signer certificate so the run log records which key signed the upload.
          keytool -printcert -jarfile "$AAB" | grep -E "Owner:|Issuer:|SHA256:" || true

      - name: Upload APK Artifact
        if: ${{ github.event.inputs.build_type == 'apk' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload AAB Artifact
        if: ${{ github.event.inputs.build_type == 'aab' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Upload to Google Play
        id: upload
        if: ${{ github.event.inputs.upload_to_play == 'true' && github.event.inputs.build_type == 'aab' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: tools.mo3ta.fitit
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.track }}
          # completed = submitted for review; draft = uploaded but held in the
          # Play Console (use when a manual permission declaration / review is
          # required before the changes can be sent for review). A draft does NOT
          # send the changes for review, so the edit commits even while an
          # App-content declaration (e.g. the foreground service permissions) is
          # still pending — land the build, complete the declaration, then submit.
          # status: ${{ github.event.inputs.submit_for_review == 'true' && 'completed' || 'draft' }}
          status: 'draft'
          # changesNotSentForReview is coupled to the Play Console "Managed Publishing"
          # setting: it MUST be true when Managed Publishing is ON (Play can't auto-send
          # for review), and MUST be false/absent when it is OFF (else the API rejects it
          # with "changesNotSentForReview must not be set"). Drive it from the input.
          #  ${{ github.event.inputs.managed_publishing == 'true' && 'true' || 'false' }}
          changesNotSentForReview: 'true'
          mappingFile: app/build/outputs/mapping/release/mapping.txt

      # Step 2: only once the publish to Google Play has succeeded do we commit
      # the bumped versionCode (and any versionName change) back to the repo.
      # If the build or upload failed, this step is skipped and the repo keeps
      # the previous version, so the next run will reuse the same versionCode.
      - name: Commit and push version changes
        if: ${{ success() && github.event.inputs.upload_to_play == 'true' && github.event.inputs.build_type == 'aab' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          git add app/build.gradle.kts
          # Mark the commit so bump_version.yml skips it and CI is not re-triggered.
          git commit -m "chore: bump versionCode to ${{ steps.bump.outputs.next }} after successful publish [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
